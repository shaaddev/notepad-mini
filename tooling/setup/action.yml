name: "Setup and install (pnpm)"

runs:
  using: composite
  steps:
    - name: setup bun
      uses: oven-sh/setup-bun@v4
      with:
        bun-version: latest

    - name: setup node
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - shell: bash
      run: bun install
